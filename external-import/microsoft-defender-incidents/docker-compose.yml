services:
  connector-microsoft-defender-incidents:
    image: opencti/connector-microsoft-defender-incidents:latest
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=ChangeMe
      - CONNECTOR_ID=ChangeMe
      #- CONNECTOR_NAME=Microsoft Defender Incidents # Optional (default: 'Microsoft Defender Incidents')
      #- CONNECTOR_SCOPE=defender # Optional (default: 'defender')
      #- CONNECTOR_LOG_LEVEL=error # Optional (default: 'error')
      #- CONNECTOR_DURATION_PERIOD=PT1H # Optional (default: 'PT1H')
      - MICROSOFT_DEFENDER_INCIDENTS_TENANT_ID=ChangeMe
      - MICROSOFT_DEFENDER_INCIDENTS_CLIENT_ID=ChangeMe
      - MICROSOFT_DEFENDER_INCIDENTS_CLIENT_SECRET=ChangeMe
      #- MICROSOFT_DEFENDER_INCIDENTS_API_BASE_URL=https://graph.microsoft.com/v1.0 # Optional (default: 'https://graph.microsoft.com/v1.0')
      #- MICROSOFT_DEFENDER_INCIDENTS_INCIDENT_PATH=/security/incidents # Optional (default: '/security/incidents')
      #- MICROSOFT_DEFENDER_INCIDENTS_IMPORT_START_DATE=2020-01-01T00:00:00Z # Optional (default: '2020-01-01T00:00:00Z')
    restart: always

version: '3'
services:
  connector-vulncheck:
    image: opencti/connector-vulncheck:latest
    environment:
      - OPENCTI_URL=http://localhost
      - OPENCTI_TOKEN=ChangeMe
      - CONNECTOR_ID=ChangeMe
      - VULNCHECK_API_KEY=ChangeMe
      # Defaults to all object types except 'software'. Uncomment to override;
      # add 'software' only if prepared for the volume (see README "Data Volume").
      # - CONNECTOR_SCOPE=vulnerability,malware,threat-actor,infrastructure,location,ip-addr,indicator,external-reference,attack-pattern,course-of-action,x-mitre-data-source,report
      # - VULNCHECK_DATA_SOURCES=botnets,epss,exploits,initial-access,ipintel,nist-nvd2,ransomware,snort,suricata,threat-actors,vulncheck-kev,vulncheck-nvd2
      # NVD2 (nist-nvd2 / vulncheck-nvd2) incremental ingestion. Normal runs are
      # incremental via connector state; the settings below only shape the first
      # run and allow manual backfills.
      # - VULNCHECK_NVD2_PULL_HISTORY=false        # true => first run pulls full history (no date filter)
      # - VULNCHECK_NVD2_MAX_DATE_RANGE=P120D      # first-run lookback (ISO-8601 duration) when not pulling history
      # - VULNCHECK_NVD2_LAST_MOD_START_DATE=      # ISO-8601 date (YYYY-MM-DD), manual backfill override (normally unset)
      # - VULNCHECK_NVD2_LAST_MOD_END_DATE=        # ISO-8601 date (YYYY-MM-DD), manual backfill override (normally unset)
    restart: always

services:
  connector-splunk:
    image: opencti/connector-splunk:latest
    environment:
      - OPENCTI_URL=http://localhost
      - OPENCTI_TOKEN=ChangeMe
      - CONNECTOR_ID=ChangeMe
      - CONNECTOR_NAME=Splunk
      - CONNECTOR_SCOPE=indicator,identity,incident
      - CONNECTOR_LOG_LEVEL=info
      - CONNECTOR_DURATION_PERIOD=PT5M
      - SPLUNK_BASE_URL=https://splunk.example.com:8089
      - SPLUNK_TOKEN=ChangeMe
      - SPLUNK_VERIFY_SSL=true
      - SPLUNK_TIMEOUT_SECONDS=60
      - SPLUNK_OWNER=-
      - SPLUNK_APP=-
      - SPLUNK_SCOPES=indicator,identity,incident
      - SPLUNK_IMPORT_INDICATORS=true
      - SPLUNK_IMPORT_IDENTITIES=true
      - SPLUNK_IMPORT_INCIDENTS=true
      - SPLUNK_INDICATORS_INTERVAL=PT1H
      - SPLUNK_IDENTITIES_INTERVAL=P1D
      - SPLUNK_INCIDENTS_INTERVAL=PT15M
      - SPLUNK_INCIDENTS_LOOKBACK=P1D
      - SPLUNK_INDICATORS_SEARCH=
      - SPLUNK_IDENTITIES_SEARCH=
      - SPLUNK_INCIDENTS_SEARCH=
      - SPLUNK_INCLUDE_DISABLED=false
      - SPLUNK_NOTE_TYPE_SEARCH_PARAMETERS=Search Parameters
      - SPLUNK_ES_API_PREFIX=/servicesNS/nobody/missioncontrol/public/v2
      - SPLUNK_TLP_LEVEL=amber
      - SPLUNK_CONFIDENCE=60
      - SPLUNK_BATCH_SIZE=500
      - SPLUNK_MAX_RECORDS_PER_RUN=10000
    restart: always

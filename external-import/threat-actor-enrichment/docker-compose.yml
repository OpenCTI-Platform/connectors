services:
  connector-threat-actor-enrichment:
    build: .
    container_name: opencti-connector-threat-actor-enrichment
    restart: unless-stopped
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_THREAT_ACTOR_ENRICHMENT_ID}
      - CONNECTOR_TYPE=EXTERNAL_IMPORT
      - CONNECTOR_NAME=Threat Actor Enrichment
      - CONNECTOR_SCOPE=threat-actor-group
      - CONNECTOR_LOG_LEVEL=info
      - THREAT_ACTOR_ENRICHMENT_ES_HOST=http://elasticsearch:9200
      - THREAT_ACTOR_ENRICHMENT_ES_USER=
      - THREAT_ACTOR_ENRICHMENT_ES_PASSWORD=
      - THREAT_ACTOR_ENRICHMENT_ES_VERIFY_SSL=false
      - THREAT_ACTOR_ENRICHMENT_SDO_INDEX=opencti_stix_domain_objects-*
      - THREAT_ACTOR_ENRICHMENT_INTERVAL=24

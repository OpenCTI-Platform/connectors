version: "3"
services:
  connector-rst-threat-library:
    image: opencti/connector-rst-threat-library:latest
    environment:
      # OpenCTI connection
      - OPENCTI_URL=${OPENCTI_URL:-http://opencti:8080}
      - OPENCTI_TOKEN=${OPENCTI_TOKEN:-${OPENCTI_ADMIN_TOKEN}}
      # Base EXTERNAL_IMPORT connector parameters
      - CONNECTOR_ID=${CONNECTOR_ID:-${RST_THREAT_LIBRARY_CONNECTOR_ID}}
      - CONNECTOR_NAME=${CONNECTOR_NAME:-RST Threat Library}
      - CONNECTOR_SCOPE=${CONNECTOR_SCOPE:-intrusion-set,malware,tool,campaign}
      - CONNECTOR_LOG_LEVEL=${CONNECTOR_LOG_LEVEL:-info}
      - CONNECTOR_DURATION_PERIOD=${CONNECTOR_DURATION_PERIOD:-${RST_THREAT_LIBRARY_DURATION_PERIOD:-PT1H}}
      - CONNECTOR_QUEUE_THRESHOLD=${CONNECTOR_QUEUE_THRESHOLD:-${RST_THREAT_LIBRARY_QUEUE_THRESHOLD:-500}}
      - CONNECTOR_UPDATE_EXISTING_DATA=${CONNECTOR_UPDATE_EXISTING_DATA:-true}
      - CONNECTOR_AUTO_CREATE_SERVICE_ACCOUNT=${CONNECTOR_AUTO_CREATE_SERVICE_ACCOUNT:-true}
      - CONNECTOR_AUTO_CREATE_SERVICE_ACCOUNT_CONFIDENCE_LEVEL=${CONNECTOR_AUTO_CREATE_SERVICE_ACCOUNT_CONFIDENCE_LEVEL:-50}
      # RST Threat Library connector parameters
      - RST_THREAT_LIBRARY_BASEURL=${RST_THREAT_LIBRARY_BASEURL:-https://api.rstcloud.net/v1}
      - RST_THREAT_LIBRARY_APIKEY=${RST_THREAT_LIBRARY_APIKEY}
      - RST_THREAT_LIBRARY_AUTH_HEADER=${RST_THREAT_LIBRARY_AUTH_HEADER:-x-api-key}
      - RST_THREAT_LIBRARY_PROXY=${RST_THREAT_LIBRARY_PROXY:-}
      - RST_THREAT_LIBRARY_SSL_VERIFY=${RST_THREAT_LIBRARY_SSL_VERIFY:-true}
      - RST_THREAT_LIBRARY_CONTIMEOUT=${RST_THREAT_LIBRARY_CONTIMEOUT:-30}
      - RST_THREAT_LIBRARY_READTIMEOUT=${RST_THREAT_LIBRARY_READTIMEOUT:-120}
      - RST_THREAT_LIBRARY_RETRY=${RST_THREAT_LIBRARY_RETRY:-2}
      - RST_THREAT_LIBRARY_MAX_RETRIES=${RST_THREAT_LIBRARY_MAX_RETRIES:-3}
      - RST_THREAT_LIBRARY_RETRY_DELAY=${RST_THREAT_LIBRARY_RETRY_DELAY:-10}
      - RST_THREAT_LIBRARY_RETRY_BACKOFF_MULTIPLIER=${RST_THREAT_LIBRARY_RETRY_BACKOFF_MULTIPLIER:-2.0}
      - RST_THREAT_LIBRARY_OBJECT_TYPES=${RST_THREAT_LIBRARY_OBJECT_TYPES:-intrusion-sets,malware,tools,campaigns}
      - RST_THREAT_LIBRARY_ORDER_BY=${RST_THREAT_LIBRARY_ORDER_BY:-modified}
      - RST_THREAT_LIBRARY_ORDER_MODE=${RST_THREAT_LIBRARY_ORDER_MODE:-desc}
      - RST_THREAT_LIBRARY_PAGE_SIZE=${RST_THREAT_LIBRARY_PAGE_SIZE:-100}
      - RST_THREAT_LIBRARY_OPENCTI_PUSH_MODE=${RST_THREAT_LIBRARY_OPENCTI_PUSH_MODE:-bundle}
      - RST_THREAT_LIBRARY_SYNC_LABELS=${RST_THREAT_LIBRARY_SYNC_LABELS:-RST Threat Library}
      - RST_THREAT_LIBRARY_RECONCILE_EXCLUDE_LABELS=${RST_THREAT_LIBRARY_RECONCILE_EXCLUDE_LABELS:-}
      - RST_THREAT_LIBRARY_RECONCILE_ALLOW_CREATED_BY=${RST_THREAT_LIBRARY_RECONCILE_ALLOW_CREATED_BY:-}
      - RST_THREAT_LIBRARY_MERGE_SPLIT=${RST_THREAT_LIBRARY_MERGE_SPLIT:-false}
      - RST_THREAT_LIBRARY_RESPECT_USER_EDITS=${RST_THREAT_LIBRARY_RESPECT_USER_EDITS:-false}
      - RST_THREAT_LIBRARY_INTRUSION_SET_DEFAULT_CONFIDENCE=${RST_THREAT_LIBRARY_INTRUSION_SET_DEFAULT_CONFIDENCE:-}
      - RST_THREAT_LIBRARY_IMPORT_FROM_DATE=${RST_THREAT_LIBRARY_IMPORT_FROM_DATE:-}
    restart: always
    depends_on:
      - opencti

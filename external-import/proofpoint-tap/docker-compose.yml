version: '3'
services:
  connector-proofpoint-tap:
    image: opencti/connector-proofpoint-tap:latest
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=ChangeMe
      - CONNECTOR_ID=c2635ebc-67f7-43a4-9caa-0d10cdc95b85
      - "CONNECTOR_NAME=Proofpoint TAP"
      - CONNECTOR_SCOPE=report
      - CONNECTOR_LOG_LEVEL=error
      - CONNECTOR_DURATION_PERIOD=PT1H
      - PROOFPOINT_TAP_API_BASE_URL=https://tap-api-v2.proofpoint.com/
      - PROOFPOINT_TAP_API_PRINCIPAL=ChangeMe
      - PROOFPOINT_TAP_API_SECRET=ChangeMe
      - PROOFPOINT_TAP_API_TIMEOUT=PT30S
      - PROOFPOINT_TAP_API_RETRIES=3
      - PROOFPOINT_TAP_API_BACKOFF=PT5S
      - PROOFPOINT_TAP_MARKING_DEFINITION=white
      - PROOFPOINT_TAP_EXPORT_CAMPAIGNS=true
      - PROOFPOINT_TAP_EXPORT_EVENTS=false
      - PROOFPOINT_TAP_EVENTS_TYPE=issues
    restart: always

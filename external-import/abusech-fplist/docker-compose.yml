version: '3'
services:
  connector-abusech-fplist:
    image: opencti/connector-abusech-fplist:latest
    environment:
      - OPENCTI_URL=http://localhost
      - OPENCTI_TOKEN=ChangeMe
      - OPENCTI_SSL_VERIFY=true
      - CONNECTOR_ID=ChangeMe
      - CONNECTOR_NAME=AbusechFplist
      - CONNECTOR_SCOPE=indicator
      - CONNECTOR_LOG_LEVEL=info
      - CONNECTOR_DURATION_PERIOD=P1D
      - ABUSECH_FPLIST_API_BASE_URL=https://hunting-api.abuse.ch/api/v1/
      - ABUSECH_FPLIST_API_KEY=ChangeMe
      - ABUSECH_FPLIST_DRY_RUN=false
    restart: always

version: '3'
services:
  connector-swimlane:
    image: opencti/connector-swimlane:rolling
    environment:
      # Generic parameters (connection with OpenCTI)
      - OPENCTI_URL=http://localhost
      - OPENCTI_TOKEN=ChangeMe
      # Common parameters for connectors of type EXTERNAL_IMPORT
      - CONNECTOR_ID=ChangeMe
      - CONNECTOR_NAME=Swimlane # optional (default: 'Swimlane')
      - CONNECTOR_SCOPE=swimlane # required
      - CONNECTOR_LOG_LEVEL=error # optional (default: 'error')
      - CONNECTOR_DURATION_PERIOD=PT15M # optional (default: 'PT15M')
      # Swimlane parameters
      - SWIMLANE_API_BASE_URL=ChangeMe # e.g. https://swimlane.example.com
      - SWIMLANE_API_TOKEN=ChangeMe
      - SWIMLANE_APPLICATION_ID=ChangeMe
      - SWIMLANE_MAX_RECORDS=100 # optional (default: 100)
      - SWIMLANE_TLP_LEVEL=amber # optional (default: 'amber')
      - SWIMLANE_SSL_VERIFY=true # optional (default: true)
    restart: always

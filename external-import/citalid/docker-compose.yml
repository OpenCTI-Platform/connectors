version: '3'
services:
  connector-citalid:
    image: opencti/connector-citalid:latest
    environment:
      - OPENCTI_URL=http://localhost
      - OPENCTI_TOKEN=ChangeMe
      - CONNECTOR_ID=ChangeMe
      - CONNECTOR_NAME=Citalid
      - CONNECTOR_SCOPE=citalid
      - CONNECTOR_RUN_AND_TERMINATE=false
      - CONNECTOR_LOG_LEVEL=error
      - CONNECTOR_DURATION_PERIOD=P1D # ISO 8601 duration (replaces deprecated CITALID_INTERVAL)
      - CITALID_CUSTOMER_SUB_DOMAIN_URL='https://ChangeMe.citalid.com'
      - CITALID_USER=ChangeMe
      - CITALID_PASSWORD=ChangeMe
    restart: always

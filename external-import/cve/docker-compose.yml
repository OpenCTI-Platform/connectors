version: '3'
services:
  connector-cve:
    image: opencti/connector-cve:latest
    environment:
      - OPENCTI_URL=http://localhost
      - OPENCTI_TOKEN=ChangeMe
      - CONNECTOR_ID=ChangeMe
      - CONNECTOR_NAME=Common Vulnerabilities and Exposures
      - CONNECTOR_SCOPE=cve
      - CONNECTOR_LOG_LEVEL=error
      - CVE_API_KEY=ChangeMe # Required
      # - CVE_INTERVAL=2 # Optional, in hours advice min 2
      # - CVE_BASE_URL=https://services.nvd.nist.gov/rest/json/cves # Optional
      # - CVE_MAX_DATE_RANGE=120 # Optional, in days, max 120
      # - CVE_MAINTAIN_DATA=true # Optional, retrieve only updated data
      # - CVE_PULL_HISTORY=false # Optional, if true CVE_HISTORY_START_YEAR is required
      # - CVE_HISTORY_START_YEAR=2019 # Required if pull_history is True, min 2019
      # - CVE_IMPORT_SOFTWARE=false # if true, resolve CPEs and import as Software objects (generates large volume of data)
      # - CVE_CPE_HISTORY_INTERVAL=P120D # Optional, interval to look back for CPE modifications (ISO 8601 duration format)
      # - CVE_CVE_MAX_CONCURRENCY=50 # Maximum number of concurrent CVE processing workers (bounds queued tasks and bundle sends)
      # - CVE_CPE_MAX_CONCURRENCY=10  # Maximum number of concurrent CPE resolution tasks
    restart: always

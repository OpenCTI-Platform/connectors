services:
  connector-mattermost:
    image: opencti/connector-mattermost:latest
    environment:
      - OPENCTI_URL=http://localhost
      - OPENCTI_TOKEN=ChangeMe
      - CONNECTOR_ID=ChangeMe
      - CONNECTOR_NAME=Mattermost
      - CONNECTOR_SCOPE=mattermost
      - CONNECTOR_LOG_LEVEL=error
      - CONNECTOR_RUN_EVERY=10m # Format <int><d|h|m|s> (e.g. 1d, 12h, 10m, 30s)
      - CONNECTOR_UPDATE_EXISTING_DATA=false
      # Mattermost server connection
      - MATTERMOST_DOMAIN=mattermost.example.org # Server hostname only, no scheme
      - MATTERMOST_PORT=8065
      - MATTERMOST_PROTOCOL=https
      - MATTERMOST_BASEPATH=/api/v4
      - MATTERMOST_TOKEN=ChangeMe
      # Comma-separated list of Mattermost channel ids to import
      - MATTERMOST_CHANNEL_IDS=ChangeMe
      # Unix epoch (seconds) of the earliest message to import on the first run
      - MATTERMOST_START_TIMESTAMP=0
      # TLP marking applied to created entities. Supported values:
      # CLEAR, WHITE (alias of CLEAR), GREEN, AMBER, AMBER_STRICT
      # (also accepted as AMBER+STRICT), RED.
      - MATTERMOST_TLP=AMBER
      # HTTP / WebSocket client behaviour
      - MATTERMOST_VERIFY=true
      - MATTERMOST_TIMEOUT=30
      # - MATTERMOST_REQUEST_TIMEOUT= # Optional, integer seconds
      - MATTERMOST_KEEPALIVE=false
      - MATTERMOST_KEEPALIVE_DELAY=5
      - MATTERMOST_DEBUG=false
    restart: always

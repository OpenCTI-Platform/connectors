version: '3'
services:
  connector-portspoof:
    image: opencti/connector-portspoof:rolling
    environment:
      - OPENCTI_URL=${OPENCTI_URL}
      - OPENCTI_TOKEN=${OPENCTI_TOKEN}
      # Must be a stable UUIDv4 (e.g. `uuidgen`). Reusing the same value
      # across restarts is required for OpenCTI to recognise the connector
      # as the same instance and preserve work tracking continuity.
      - CONNECTOR_ID=${CONNECTOR_ID}
      - CONNECTOR_NAME=${CONNECTOR_NAME:-PortSpoofPro}
      # ``CONNECTOR_SCOPE`` declares the STIX types this connector
      # ingests. Default kept aligned with ``build_config_from_env``
      # (``synchronizer.py``) so the compose-with-defaults path
      # registers the connector with the same scope the code expects;
      # operators can override the env var to narrow the scope without
      # editing the code.
      - CONNECTOR_SCOPE=${CONNECTOR_SCOPE:-Threat-Actor,Observed-Data,IPv4-Addr,IPv6-Addr,Tool,Attack-Pattern,Report,Relationship,Sighting}
      - CONNECTOR_LOG_LEVEL=${CONNECTOR_LOG_LEVEL:-info}
      # Default mirrors the connector-side default in ``build_config_from_env``
      # so leaving ``RABBITMQ_URL`` unset in the operator's ``.env`` does not
      # blank the value through ``${RABBITMQ_URL}`` (which would override the
      # application default with an empty string and the connector would try
      # to connect with no URL at all).
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      - RABBITMQ_QUEUE_NAME=${RABBITMQ_QUEUE_NAME:-opencti-connector-queue}
      - PS_LOG_FILE=${PS_LOG_FILE:-}
      - PS_DEBUG_FULL_DUMPS=${PS_DEBUG_FULL_DUMPS:-0}
    restart: always

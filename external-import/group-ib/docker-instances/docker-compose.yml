# Optional multi-instance layout: same image, different env per service.
# Root project docker-compose.yml is unchanged. See README.md in this folder.
services:
  connector_accounts_unique:
    build:
      context: ..
      dockerfile: Dockerfile
    image: opencti/connector-group-ib:rolling
    container_name: gib-accounts-unique
    env_file:
      - path: ./env/common.env
        required: true
      - path: ./env/groups/accounts-unique.env
        required: false
    volumes:
      - ../logs/instances/accounts-unique:/opt/connector/logs/
    restart: always
    networks:
      - gib_connector_net


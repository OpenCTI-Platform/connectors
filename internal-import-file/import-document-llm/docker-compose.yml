version: '3'
services:
  connector-import-document-llm:
    image: opencti/connector-import-document-llm:latest
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=ChangeMe
      - CONNECTOR_ID=ChangeMe
      - CONNECTOR_NAME=ImportDocumentLLM
      - CONNECTOR_VALIDATE_BEFORE_IMPORT=true # Validate any bundle before import
      - CONNECTOR_SCOPE=application/pdf,text/plain,text/html,text/markdown,text/csv,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/msword,application/octet-stream
      - CONNECTOR_AUTO=false # Enable/disable auto-import of file
      - CONNECTOR_LOG_LEVEL=error
      # Select AI backend: openai | azureopenai | ollama
      - IMPORT_DOCUMENT_AI_PROVIDER=ollama
      # Optional: Select which AI model to use
      - IMPORT_DOCUMENT_AI_MODEL=gemma4
      # Optional: Enable/disable lazy PDF OCR (default: false)
      - IMPORT_DOCUMENT_PDF_OCR=false
      # OpenAI (required when provider=openai)
      # - OPENAI_API_KEY=ChangeMe
      # Azure OpenAI integration (set all to enable when provider=azureopenai)
      # - AZURE_OPENAI_ENDPOINT=https://YOUR-RESOURCE-NAME.openai.azure.com/
      # - AZURE_OPENAI_KEY=YOUR_AZURE_OPENAI_KEY
      # - AZURE_OPENAI_DEPLOYMENT=YOUR_DEPLOYMENT_NAME
      # - AZURE_OPENAI_API_VERSION=2024-02-15-preview
      # Ollama integration (when provider=ollama)
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_PULL_ON_START=false
      - IMPORT_DOCUMENT_RUN_BINARY_CACHE_SIZE=100000
      - IMPORT_DOCUMENT_RUN_TEXT_CACHE_SIZE=100000
      # Optional token window override (input + output)
      - IMPORT_DOCUMENT_MAX_MODEL_TOKENS=32000
    restart: always
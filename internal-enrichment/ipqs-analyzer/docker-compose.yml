version: "3"
services:
  connector-ipqs-analyzer:
    image: opencti/connector-ipqs-analyzer:latest
    build: .
    environment:
      - OPENCTI_URL=http://localhost
      - OPENCTI_TOKEN=ChangeMe
      - CONNECTOR_ID=IPQS_Analyzer
      - CONNECTOR_NAME=IPQS Malware And Virus File Scanner
      - CONNECTOR_SCOPE=Artifact,Url
      - CONNECTOR_TYPE=INTERNAL_ENRICHMENT
      - CONNECTOR_AUTO=false
      - CONNECTOR_CONFIDENCE_LEVEL=50
      - CONNECTOR_LOG_LEVEL=info
      - IPQS_ANALYZER_SERVER=https://ipqualityscore.com/api/json
      - IPQS_ANALYZER_API_KEY=ChangeMe
      - IPQS_ANALYZER_DEFAULT_COLOR=#54483b
      - IPQS_ANALYZER_CLASSIFICATIONS_COLOR=#54483b
      - IPQS_ANALYZER_DEFAULT_TLP=TLP:CLEAR
      - IPQS_ANALYZER_MAX_TLP=TLP:AMBER
    restart: always
    networks:
      - opencti-net

networks:
  opencti-net:
    external: true
    name: opencti_default

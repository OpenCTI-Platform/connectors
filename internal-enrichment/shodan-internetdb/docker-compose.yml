---

version: '3'
services:
  connector-shodan-internetdb:
    image: opencti/connector-shodan-internetdb:latest
    environment:
      - OPENCTI_URL=http://localhost
      - OPENCTI_TOKEN=ChangeMe
      - CONNECTOR_ID=ChangeMe
      #- CONNECTOR_NAME=Shodan InternetDB # Optional (default: 'Shodan InternetDB')
      #- CONNECTOR_SCOPE=IPv4-Addr # Optional (default: 'IPv4-Addr')
      #- CONNECTOR_AUTO=true # Optional (default: false)
      #- CONNECTOR_LOG_LEVEL=error # Optional (default: 'error')
      #- SHODAN_MAX_TLP=TLP:CLEAR # Optional (default: 'TLP:WHITE')
      #- SHODAN_SSL_VERIFY=true # Optional (default: true)
    restart: always

    skip: false

  "pan:threat":
    vendor: "Palo Alto Networks"
    product: "PAN-OS"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "firewall"
    datamodels:
      - "Intrusion_Detection"
    description: >-
      Palo Alto Networks PAN-OS threat logs record security profile
      verdicts including IPS alerts, URL filtering blocks, antivirus
      detections, and anti-spyware matches. They are the primary source

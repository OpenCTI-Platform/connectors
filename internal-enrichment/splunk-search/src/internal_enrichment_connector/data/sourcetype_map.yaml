# sourcetype_map.yaml
# Maps Splunk sourcetypes to vendor/product metadata and STIX entity classification.
# Used by the Splunk Search connector to create proper STIX entities when enriching
# OpenCTI indicators with Splunk search results.
#
# Schema per entry:
#   vendor: str              — Vendor/organization name
#   product: str             — Product/service name
#   entity_type: str         — "Infrastructure" or "Software"
#   infrastructure_types:    — Only present when entity_type is "Infrastructure"
#     - str                  — e.g. firewall, ids, endpoint-security, cloud-service
#   datamodels:              — Splunk CIM data model(s) this sourcetype maps to
#     - str
#   skip: bool               — true for Splunk-internal sourcetypes that should
#                              not produce STIX entities

_metadata:
  version: "1.0.0"
  description: "Static sourcetype to platform mapping for STIX entity creation"
  last_updated: "2026-05-29"
  sources:
    - "Splunk BOTS datasets"
    - "Common production sourcetypes"

sourcetype_map:

  # ---------------------------------------------------------------------------
  # Amazon Web Services
  # ---------------------------------------------------------------------------
  "amazon-ssm-agent":
    vendor: "Amazon Web Services"
    product: "Systems Manager Agent"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "cloud-service"
    datamodels: []
    description: >-
      AWS Systems Manager Agent runs on EC2 instances to enable remote
      management, patch enforcement, and command execution. It produces
      session, run-command, and patch-compliance telemetry relevant to
      endpoint security monitoring.
    skip: false

  "aws:cloudfront:accesslogs":
    vendor: "Amazon Web Services"
    product: "CloudFront"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "cloud-service"
    datamodels:
      - "Web"
    description: >-
      Amazon CloudFront access logs record HTTP/HTTPS requests served by
      the CDN, including client IP, URI, response code, and bytes
      transferred. They support web threat detection, abuse analysis,
      and traffic pattern investigation.
    skip: false

  "aws:cloudtrail":
    vendor: "Amazon Web Services"
    product: "CloudTrail"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "cloud-service"
    datamodels:
      - "Authentication"
      - "Change"
    description: >-
      AWS CloudTrail captures API call history across AWS services,
      recording who made each request, when, and from where. It is the
      primary source for cloud audit, compliance, and account-level
      threat detection.
    skip: false

  "aws:cloudwatchlogs:vpcflow":
    vendor: "Amazon Web Services"
    product: "VPC Flow Logs"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "cloud-service"
    datamodels:
      - "Network_Traffic"
    description: >-
      AWS VPC Flow Logs capture IP traffic metadata for VPC network
      interfaces, recording accepted and rejected connections. They
      support network threat detection, lateral movement analysis, and
      compliance auditing.
    skip: false

  "aws:config:rule":
    vendor: "Amazon Web Services"
    product: "AWS Config"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "cloud-service"
    datamodels:
      - "Change"
    description: >-
      AWS Config Rule evaluation results record whether AWS resources
      comply with organizational policies. They support change
      management, compliance reporting, and detecting cloud resource
      misconfigurations.
    skip: false

  "aws:guardduty":
    vendor: "Amazon Web Services"
    product: "GuardDuty"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "cloud-security"
    datamodels:
      - "Intrusion_Detection"
    description: >-
      Amazon GuardDuty analyzes VPC Flow Logs, CloudTrail, and DNS logs
      to detect threats such as compromised instances, reconnaissance,
      and data exfiltration. Its findings are pre-scored anomalies and
      known-bad-IP detections.
    skip: false

  "aws:s3:accesslogs":
    vendor: "Amazon Web Services"
    product: "S3"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "cloud-service"
    datamodels:
      - "Web"
    description: >-
      Amazon S3 server access logs record bucket-level request details
      including requester, operation, response code, and bytes
      transferred. They support data exfiltration detection and storage
      access auditing.
    skip: false

  "aws:waf":
    vendor: "Amazon Web Services"
    product: "WAF"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "cloud-security"
    datamodels:
      - "Intrusion_Detection"
    description: >-
      AWS WAF logs HTTP request evaluations by web ACL rules, recording
      rule matches, allow/block decisions, and matched conditions. They
      support web application attack detection and WAF rule tuning.
    skip: false

  # ---------------------------------------------------------------------------
  # Carbon Black / Bit9
  # ---------------------------------------------------------------------------
  "bit9:carbonblack:json":
    vendor: "VMware Carbon Black"
    product: "Carbon Black"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "endpoint-security"
    datamodels:
      - "Endpoint"
    description: >-
      Carbon Black (Bit9) provides application control and endpoint
      detection telemetry via file-integrity and process-execution
      events. This JSON sourcetype covers the event stream from legacy
      Bit9/Carbon Black deployments.
    skip: false

  "carbonblack:defense:json":
    vendor: "VMware Carbon Black"
    product: "Carbon Black Defense"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "endpoint-security"
    datamodels:
      - "Endpoint"
    description: >-
      VMware Carbon Black Defense delivers cloud-native endpoint
      protection telemetry including process events, network
      connections, and policy verdicts. This JSON sourcetype covers its
      prevention and detection event stream.
    skip: false

  "carbonblack:response:json":
    vendor: "VMware Carbon Black"
    product: "Carbon Black Response"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "endpoint-security"
    datamodels:
      - "Endpoint"
    description: >-
      VMware Carbon Black Response provides EDR telemetry including
      process tree data, file modifications, registry changes, and
      network connections. This JSON sourcetype is used for threat
      hunting and incident response.
    skip: false

  # ---------------------------------------------------------------------------
  # Cisco (including Snort)
  # ---------------------------------------------------------------------------
  "cisco:asa":
    vendor: "Cisco"
    product: "Adaptive Security Appliance"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "firewall"
    datamodels:
      - "Network_Traffic"
      - "Intrusion_Detection"
    description: >-
      Cisco ASA logs cover firewall policy decisions, NAT translations,
      VPN session events, and IPS alerts. They are a primary source for
      network perimeter threat detection and access policy auditing.
    skip: false

  "cisco:estreamer:data":
    vendor: "Cisco"
    product: "Firepower"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "firewall"
    datamodels:
      - "Intrusion_Detection"
    description: >-
      Cisco Firepower eStreamer provides a real-time event stream from
      the Firepower Management Center including IPS alerts, connection
      events, file events, and security intelligence matches. It
      delivers deep network security telemetry for threat detection.
    skip: false

  "cisco:firepower:syslog":
    vendor: "Cisco"
    product: "Firepower"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "firewall"
    datamodels:
      - "Intrusion_Detection"
    description: >-
      Cisco Firepower syslog output covers IPS alert notifications,
      connection events, and security intelligence blocks in standard
      syslog format. It provides network intrusion detection telemetry
      for environments using syslog-based collection.
    skip: false

  "cisco:ios":
    vendor: "Cisco"
    product: "IOS"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "network"
    datamodels:
      - "Network_Traffic"
      - "Change"
    description: >-
      Cisco IOS logs cover routing, switching, and network
      infrastructure events including interface state changes, ACL hits,
      authentication events, and configuration changes. They support
      network infrastructure monitoring and change auditing.
    skip: false

  "cisco:meraki":
    vendor: "Cisco"
    product: "Meraki"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "network"
    datamodels:
      - "Network_Traffic"
    description: >-
      Cisco Meraki cloud-managed networking logs cover firewall events,
      content filtering, wireless association, and VPN session
      telemetry. They provide unified network visibility for branch and
      campus environments.
    skip: false

  "snort":
    vendor: "Cisco"
    product: "Snort"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "ids"
    datamodels:
      - "Intrusion_Detection"
    description: >-
      Snort IDS generates alert events when traffic matches detection
      rules, producing records containing rule metadata,
      source/destination, protocol, and payload details. It is a widely
      deployed open-source intrusion detection sensor.
    skip: false

  "snort:alert:json":
    vendor: "Cisco"
    product: "Snort"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "ids"
    datamodels:
      - "Intrusion_Detection"
    description: >-
      Snort IDS JSON alert output provides structured intrusion
      detection events with rule metadata, classification, and network
      context. This format enables richer automated parsing compared to
      legacy syslog format.
    skip: false

  # ---------------------------------------------------------------------------
  # CrowdStrike
  # ---------------------------------------------------------------------------
  "CrowdStrike:Event:Streams:JSON":
    vendor: "CrowdStrike"
    product: "Falcon"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "endpoint-security"
    datamodels: []
    description: >-
      CrowdStrike Falcon Streaming API delivers real-time endpoint
      telemetry and detection events in JSON format, covering process,
      network, registry, and file-system activity from the Falcon
      sensor. It is the primary high-fidelity EDR data source for
      CrowdStrike deployments.
    skip: false

  "crowdstrike:events:incident":
    vendor: "CrowdStrike"
    product: "Falcon"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "endpoint-security"
    datamodels:
      - "Intrusion_Detection"
    description: >-
      CrowdStrike Falcon incident events represent aggregated detection
      activity linked to an adversary behavior pattern. They provide
      context-rich incident records useful for tracking threat actor
      campaign activity.
    skip: false

  "crowdstrike:events:sensor":
    vendor: "CrowdStrike"
    product: "Falcon"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "endpoint-security"
    datamodels:
      - "Endpoint"
    description: >-
      CrowdStrike Falcon sensor events cover low-level endpoint
      telemetry including process execution, network connections, and
      file writes. They support endpoint threat hunting and behavioral
      analysis.
    skip: false

  # ---------------------------------------------------------------------------
  # Fortinet
  # ---------------------------------------------------------------------------
  "fgt_event":
    vendor: "Fortinet"
    product: "FortiGate"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "firewall"
    datamodels:
      - "Change"
    description: >-
      FortiGate event logs capture system and administrative events
      including configuration changes, VPN tunnel state, and
      administrator authentication. They support operational auditing
      and change management for Fortinet firewall deployments.
    skip: false

  "fgt_traffic":
    vendor: "Fortinet"
    product: "FortiGate"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "firewall"
    datamodels:
      - "Network_Traffic"
    description: >-
      FortiGate traffic logs record network flow data including
      source/destination IPs, ports, policy actions (allow/deny), and
      bytes transferred. They are the primary source for network
      visibility and threat detection in FortiGate environments.
    skip: false

  "fgt_utm":
    vendor: "Fortinet"
    product: "FortiGate"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "firewall"
    datamodels:
      - "Intrusion_Detection"
    description: >-
      FortiGate UTM logs cover security profile verdicts including
      antivirus detections, web filtering blocks, application control
      decisions, and IPS alerts. They provide layered security telemetry
      for detecting multi-vector attacks.
    skip: false

  # ---------------------------------------------------------------------------
  # Linux / Unix System
  # ---------------------------------------------------------------------------
  "alternatives.log":
    vendor: "Debian"
    product: "update-alternatives"
    entity_type: "Software"
    datamodels: []
    description: >-
      Debian update-alternatives logs record changes to symbolic links
      that define default system commands (e.g., default Python or
      editor). They are useful for detecting unauthorized binary
      substitution or persistence via command aliasing.
    skip: false

  "apport.log":
    vendor: "Canonical"
    product: "Apport"
    entity_type: "Software"
    datamodels: []
    description: >-
      Ubuntu Apport crash reporter logs capture application crash events
      including the faulting binary, signal, and crash file path. They
      support host stability monitoring and forensic analysis of
      crashing processes.
    skip: false

  "bootstrap.log":
    vendor: "Canonical"
    product: "Ubuntu"
    entity_type: "Software"
    datamodels: []
    description: >-
      Ubuntu bootstrap logs capture package installation and
      configuration events during system initialization. They provide
      insight into the installed software baseline at system
      provisioning time.
    skip: false

  "cloud-init":
    vendor: "Canonical"
    product: "cloud-init"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "cloud-service"
    datamodels: []
    description: >-
      cloud-init logs capture instance initialization events including
      user-data script execution, package installation, and network
      configuration. They are critical for auditing cloud instance
      bootstrap behavior and detecting unauthorized initialization
      commands.
    skip: false

  "cloud-init-output":
    vendor: "Canonical"
    product: "cloud-init"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "cloud-service"
    datamodels: []
    description: >-
      cloud-init-output captures stdout/stderr from cloud-init
      execution, providing verbose detail about commands run during
      instance startup. It complements cloud-init log data with raw
      output for forensic investigation of bootstrap activities.
    skip: false

  "dpkg.log":
    vendor: "Debian"
    product: "dpkg"
    entity_type: "Software"
    datamodels: []
    description: >-
      Debian package manager (dpkg) logs record package installation,
      removal, and upgrade events with timestamps and package versions.
      They support software inventory auditing and detection of
      unauthorized package changes.
    skip: false

  "kern.log":
    vendor: "Linux"
    product: "Kernel"
    entity_type: "Software"
    datamodels: []
    description: >-
      The Linux kernel log records low-level system events including
      hardware errors, module loading, security policy decisions (e.g.,
      SELinux/AppArmor denials), and OOM killer activity. It provides
      foundational host telemetry for incident investigation.
    skip: false

  "linux:audit":
    vendor: "Linux"
    product: "auditd"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "endpoint"
    datamodels:
      - "Authentication"
      - "Change"
    description: >-
      Linux auditd generates security-relevant kernel events including
      system calls, file access, authentication events, and privilege
      escalation. It is the primary host-based audit data source for
      Linux security monitoring and compliance.
    skip: false

  "linux_secure":
    vendor: "Linux"
    product: "PAM / sshd"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "endpoint"
    datamodels:
      - "Authentication"
    description: >-
      The Linux secure log (PAM/sshd) records authentication events
      including SSH logins, sudo usage, and PAM module outcomes. It is
      the primary source for detecting brute-force attacks, credential
      abuse, and unauthorized access on Linux hosts.
    skip: false

  "syslog":
    vendor: "Linux"
    product: "syslog"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "endpoint"
    datamodels:
      - "Endpoint"
    description: >-
      The Linux syslog captures general system and application log
      messages from the kernel and daemon processes. It provides broad
      host telemetry useful for correlating events across endpoint
      security investigations.
    skip: false

  # ---------------------------------------------------------------------------
  # Microsoft Windows, Azure & Microsoft 365
  # ---------------------------------------------------------------------------
  "WinEventLog:Application":
    vendor: "Microsoft"
    product: "Windows"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "endpoint"
    datamodels:
      - "Endpoint"
    description: >-
      Windows Application Event Log records events generated by
      applications and services installed on the system. It supports
      monitoring for application errors, crashes, and security-relevant
      application behavior.
    skip: false

  "WinEventLog:Security":
    vendor: "Microsoft"
    product: "Windows"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "endpoint"
    datamodels:
      - "Authentication"
    description: >-
      Windows Security Event Log captures authentication, authorization,
      and audit policy events including logon/logoff, privilege use,
      object access, and process creation. It is the primary source for
      identity threat detection and compliance monitoring on Windows
      endpoints.
    skip: false

  "WinEventLog:System":
    vendor: "Microsoft"
    product: "Windows"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "endpoint"
    datamodels:
      - "Endpoint"
      - "Change"
    description: >-
      Windows System Event Log records OS-level events including service
      start/stop, driver loading, hardware errors, and system
      configuration changes. It supports endpoint monitoring and
      detection of persistence via service manipulation.
    skip: false

  "XmlWinEventLog:Microsoft-Windows-Sysmon/Operational":
    vendor: "Microsoft"
    product: "Sysmon"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "endpoint-security"
    datamodels:
      - "Endpoint"
    description: >-
      Microsoft Sysmon generates detailed endpoint telemetry including
      process creation with full command lines, network connections,
      file creation time changes, and registry modifications. It is a
      widely used endpoint security sensor for threat hunting and
      detection.
    skip: false

  "XmlWinEventLog:Security":
    vendor: "Microsoft"
    product: "Windows"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "endpoint"
    datamodels:
      - "Authentication"
    description: >-
      Windows Security Event Log in XML format provides the same
      authentication and audit telemetry as WinEventLog:Security with
      richer structured field parsing. It is preferred for modern Splunk
      deployments requiring full event detail.
    skip: false

  "azure:monitor:aad":
    vendor: "Microsoft"
    product: "Azure Monitor"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "identity-provider"
    datamodels:
      - "Authentication"
    description: >-
      Azure Monitor Azure Active Directory logs capture sign-in and
      audit events from Microsoft Entra ID, including user
      authentication, MFA outcomes, and directory changes. They are the
      primary source for identity threat detection in Azure
      environments.
    skip: false

  "azure:security:center":
    vendor: "Microsoft"
    product: "Azure Security Center"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "cloud-security"
    datamodels:
      - "Intrusion_Detection"
    description: >-
      Microsoft Defender for Cloud generates security alerts and
      recommendations for Azure workloads, covering misconfigurations,
      anomalous activity, and known attack patterns. These findings
      integrate cloud workload protection telemetry.
    skip: false

  "ms:aad:audit":
    vendor: "Microsoft"
    product: "Entra ID"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "identity-provider"
    datamodels:
      - "Authentication"
      - "Change"
    description: >-
      Microsoft Entra ID audit logs record directory change events
      including user creation/deletion, group membership changes, role
      assignments, and application registration. They support identity
      governance monitoring and insider threat detection.
    skip: false

  "ms:aad:signin":
    vendor: "Microsoft"
    product: "Entra ID"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "identity-provider"
    datamodels:
      - "Authentication"
    description: >-
      Microsoft Entra ID sign-in logs capture authentication events
      including interactive and non-interactive user logins, service
      principal authentications, and conditional access policy outcomes.
      They are essential for detecting credential abuse and account
      takeover.
    skip: false

  "ms:o365:management":
    vendor: "Microsoft"
    product: "Microsoft 365"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "cloud-service"
    datamodels:
      - "Change"
    description: >-
      Microsoft 365 Management Activity API logs cover audit events
      across Exchange, SharePoint, Teams, and Entra ID. They provide
      unified cloud productivity telemetry for detecting data
      exfiltration and account compromise.
    skip: false

  "o365:management:activity":
    vendor: "Microsoft"
    product: "Microsoft 365"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "cloud-service"
    datamodels:
      - "Change"
      - "Email"
      - "Web"
    description: >-
      Microsoft 365 Management Activity logs record user and
      administrator actions across Office 365 services including email
      access, file sharing, and configuration changes. They support
      compliance monitoring and insider threat detection.
    skip: false

  # ---------------------------------------------------------------------------
  # Nessus / Tenable
  # ---------------------------------------------------------------------------
  "nessus:scan":
    vendor: "Tenable"
    product: "Nessus"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "vulnerability-scanner"
    datamodels:
      - "Vulnerabilities"
    description: >-
      Tenable Nessus vulnerability scan results contain discovered
      vulnerabilities, their CVSS scores, affected hosts, and
      remediation guidance. They provide vulnerability posture telemetry
      for correlating threat activity with exploitable weaknesses.
    skip: false

  # ---------------------------------------------------------------------------
  # Okta
  # ---------------------------------------------------------------------------
  "okta:im":
    vendor: "Okta"
    product: "Okta Identity Cloud"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "identity-provider"
    datamodels:
      - "Authentication"
    description: >-
      Okta Identity Management logs capture identity lifecycle events
      including user provisioning, group membership changes, and
      application assignments. They support identity governance
      monitoring and detection of unauthorized account changes.
    skip: false

  "okta:log2":
    vendor: "Okta"
    product: "Okta Identity Cloud"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "identity-provider"
    datamodels:
      - "Authentication"
      - "Change"
    description: >-
      Okta system log records authentication, authorization, and
      administrative events across the Okta Identity Cloud, including
      MFA challenges, policy evaluations, and suspicious activity flags.
      It is the primary source for identity threat detection in Okta-
      managed environments.
    skip: false

  # ---------------------------------------------------------------------------
  # OSQuery
  # Note: OSQuery:results / osquery:results are distinct sourcetypes (case differs).
  # osquery:info and osquery:warning are OSQuery's own diagnostic logs (Software);
  # OSQuery:results / osquery:results contain endpoint query data (Infrastructure).
  # ---------------------------------------------------------------------------
  "OSQuery:results":
    vendor: "OSQuery"
    product: "OSQuery"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "endpoint-security"
    datamodels: []
    description: >-
      OSQuery differential and snapshot query results provide endpoint
      state telemetry including running processes, open network
      connections, installed packages, and user accounts. This case-
      sensitive sourcetype captures result data used for threat hunting
      and compliance checks.
    skip: false

  "osquery:info":
    vendor: "OSQuery"
    product: "OSQuery"
    entity_type: "Software"
    datamodels: []
    description: >-
      OSQuery informational logs capture the OSQuery agent's operational
      status including configuration updates, schedule execution, and
      daemon health. These are diagnostic logs not directly useful for
      threat detection.
    skip: false

  "osquery:results":
    vendor: "OSQuery"
    product: "OSQuery"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "endpoint-security"
    datamodels: []
    description: >-
      OSQuery differential and snapshot query results (lowercase
      variant) provide the same endpoint state telemetry as
      OSQuery:results. Both sourcetypes may appear depending on Splunk
      forwarder configuration.
    skip: false

  "osquery:warning":
    vendor: "OSQuery"
    product: "OSQuery"
    entity_type: "Software"
    datamodels: []
    description: >-
      OSQuery warning logs record non-fatal agent issues such as query
      performance problems and configuration warnings. They are
      primarily operational and diagnostic rather than security
      telemetry.
    skip: false

  # ---------------------------------------------------------------------------
  # Palo Alto Networks
  # ---------------------------------------------------------------------------
  "pan:config":
    vendor: "Palo Alto Networks"
    product: "PAN-OS"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "firewall"
    datamodels:
      - "Change"
    description: >-
      Palo Alto Networks PAN-OS configuration logs record administrative
      changes to firewall policy, objects, and settings. They support

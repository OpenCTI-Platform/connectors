    skip: false

  "pan:system":
    vendor: "Palo Alto Networks"
    product: "PAN-OS"
    entity_type: "Infrastructure"
    infrastructure_types:
      - "firewall"
    datamodels: []
    description: >-
      Palo Alto Networks PAN-OS system logs capture device-level events

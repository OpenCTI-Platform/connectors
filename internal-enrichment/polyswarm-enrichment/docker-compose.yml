services:
  connector-polyswarm-enrichment:
    image: opencti/connector-polyswarm-enrichment:7.260619.0
    environment:
      # ========== OpenCTI Configuration ==========
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_TOKEN}

      # ========== Connector Configuration ==========
      - CONNECTOR_ID=${CONNECTOR_ID}
      - CONNECTOR_TYPE=INTERNAL_ENRICHMENT
      - CONNECTOR_NAME=PolySwarm Hash Enrichment
      - CONNECTOR_SCOPE=StixFile,Artifact
      - CONNECTOR_AUTO=true
      - CONNECTOR_CONFIDENCE_LEVEL=80
      - CONNECTOR_LOG_LEVEL=info

      # ========== PolySwarm Configuration ==========
      - POLYSWARM_API_KEY=${POLYSWARM_API_KEY}
      - POLYSWARM_COMMUNITY=default
      - POLYSWARM_MAX_POLLING_TIME=120
      # - POLYSWARM_MAX_TLP=TLP:AMBER  # Optional: refuse enrichment above this TLP
      # - POLYKG_API_URL=              # Optional: production polykg URL for profile enrichment
    restart: always

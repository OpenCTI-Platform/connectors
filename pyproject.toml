[tool.deptry]
# Map PyPI package names to their actual Python import module names.
# This prevents false positives when the install name differs from the import name.
[tool.deptry.package_module_name_map]
# --- Well-known PyPI name ≠ import name mismatches ---
"beautifulsoup4" = "bs4"
"GitPython" = "git"
"PyGithub" = "github"
"PyYAML" = "yaml"
"python-dateutil" = "dateutil"
"python-docx" = "docx"
"pydantic-settings" = "pydantic_settings"
"typing-extensions" = "typing_extensions"
"vt-py" = "vt"

# --- STIX / TAXII ecosystem ---
"stix2-elevator" = "stix2elevator"
"stix2-validator" = "stix2validator"
"taxii2-client" = "taxii2client"

# --- Vendor SDKs ---
"anyrun-sdk" = "anyrun"
"crowdstrike-falconpy" = "falconpy"
"datalake-scripts" = "datalake"
"domaintools-api" = "domaintools"
"edgegrid-python" = "akamai"
"feedly-client" = "feedly"
"matrix-nio" = "nio"
"msgraph-sdk" = "msgraph"
"OTXv2" = "OTXv2"
"pySigma" = "sigma"
"sixgill-clients" = "cybersixgill"
"valhallaAPI" = "valhallaAPI"
"vmray-rest-api" = "vmray"
"yara-python" = "yara"

# --- Google namespace packages (google.auth / google.oauth2 come from google-auth) ---
"google-auth" = "google"
"google-api-python-client" = "googleapiclient"

# --- Azure namespace packages ---
"azure-identity" = "azure"

# --- Other ---
"pdfminer.six" = "pdfminer"
"stix-shifter-utils" = "stix_shifter"

# Packages that are loaded as plugins at runtime with no direct import.
[tool.deptry.per_rule_ignores]
DEP002 = [
  # Loaded by stix-shifter-utils as a plugin at runtime.
  "stix-shifter-modules-splunk",
  # Required by pydantic for EmailStr validation; used implicitly, never imported directly.
  "email_validator",
  # Implicit HTTP transports for google-auth; presence in env alters google-auth behaviour
  # without being imported directly (see google-auth-library-python docs).
  "google-auth-oauthlib",
  "google-auth-httplib2",
]

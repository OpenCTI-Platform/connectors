#file: noinspection YAMLSchemaValidation
version: 2.1
setup: true
orbs:
  slack: circleci/slack@4.15.0
  continuation: circleci/continuation@1.1.0

executors:
  ci_environment:
    parameters:
      tags:
        type: string
        default: "rolling"
        description: Image tags
    environment:
      BUILD_TAGS: <<parameters.tags>>
    docker:
      - image: cimg/python:3.11
  ci_notifications:
    docker:
      - image: "cimg/base:stable"

commands:
  resolve_release_ref:
    description: Resolve RELEASE_REF from PR base branch, fallback to closest base branch script.
    steps:
      - run:
          name: Resolve RELEASE_REF
          command: |
            PR_BASE_REF=""

            if [ -n "${CIRCLE_PULL_REQUEST:-}" ]; then
              PR_NUMBER="${CIRCLE_PULL_REQUEST##*/}"
              API_URL="https://api.github.com/repos/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}/pulls/${PR_NUMBER}"

              if [ -n "${GITHUB_TOKEN:-}" ]; then
                PR_BASE_REF="$(curl --silent --show-error --fail \
                  -H "Accept: application/vnd.github+json" \
                  -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                  "${API_URL}" \
                | python3 -c 'import json,sys; print((json.load(sys.stdin).get("base") or {}).get("ref",""))')" || PR_BASE_REF=""
              else
                PR_BASE_REF="$(curl --silent --show-error --fail \
                  -H "Accept: application/vnd.github+json" \
                  "${API_URL}" \
                | python3 -c 'import json,sys; print((json.load(sys.stdin).get("base") or {}).get("ref",""))')" || PR_BASE_REF=""
              fi
            fi

            if [ -n "${PR_BASE_REF:-}" ]; then
              case "${PR_BASE_REF}" in
                master|release/6.9.x|lts/*)
                  RESOLVED_RELEASE_REF="${PR_BASE_REF}"
                  echo "Using PR base branch for RELEASE_REF: ${RESOLVED_RELEASE_REF}"
                  ;;
                *)
                  RESOLVED_RELEASE_REF="$(bash ./shared/tools/ci/detect-base-branch.sh origin)"
                  echo "PR base '${PR_BASE_REF}' is outside allowed refs, using fallback RELEASE_REF: ${RESOLVED_RELEASE_REF}"
                  ;;
              esac
            else
              RESOLVED_RELEASE_REF="$(bash ./shared/tools/ci/detect-base-branch.sh origin)"
              echo "Using detected fallback RELEASE_REF: ${RESOLVED_RELEASE_REF}"
            fi
            echo "export RELEASE_REF=${RESOLVED_RELEASE_REF}" >> "$BASH_ENV"
            echo "RELEASE_REF=${RESOLVED_RELEASE_REF}" >> "$BASH_ENV"

jobs:
  ensure_formatting:
    docker:
      - image: cimg/python:3.12
    working_directory: ~/repo
    steps:
      - checkout
      - run: sudo apt-get update -qq && sudo apt install curl gettext-base
      - run:
          name: install dependencies
          command: pip install -r ci-requirements.txt --user
      - run:
          name: run isort check
          command: isort --profile black --check .
      - run:
          name: run black check
          command: black --check .
      - slack/notify:
          event: fail
          template: basic_fail_1
  base_linter:
    docker:
      - image: alpine/flake8:7.3.0
    working_directory: ~/repo
    steps:
      - checkout
      - run: apk update && apk upgrade && apk --no-cache add curl gettext
      - run:
          name: flake8
          command: flake8 --ignore=E,W ~/repo
      - slack/notify:
          event: fail
          template: basic_fail_1
  linter:
    docker:
      - image: cimg/python:3.12
    working_directory: ~/repo
    steps:
      - checkout
      - run: sudo apt-get update -qq && sudo apt install curl gettext-base
      - run:
          name: install dependencies
          command: pip install -r ./shared/pylint_plugins/check_stix_plugin/requirements.txt
      - run:
          name: pylint
          command: cd ./shared/pylint_plugins/check_stix_plugin && PYTHONPATH=. python -m pylint ../../../ --disable=all --enable=no_generated_id_stix,no-value-for-parameter,unused-import --load-plugins linter_stix_id_generator
      - slack/notify:
          event: fail
          template: basic_fail_1
  build_manifest:
    docker:
      - image: cimg/python:3.12
    working_directory: ~/repo
    parameters:
      ci_executor:
        type: executor
        description: Executor to use for this job.
        default: ci_environment
    executor: << parameters.ci_executor >>
    steps:
      - checkout
      - resolve_release_ref
      - run:
          name: Build Connectors Schemas for XTM composer and Update Config Documentation
          command: |
            bash ./shared/tools/composer/generate_connectors_config_schemas/generate_connectors_config_json_schemas.sh
      - run:
          name: Build Manifest for XTM composer
          command: |
            bash ./shared/tools/composer/generate_global_manifest/generate_global_manifest.sh
      - run:
          name: Commit Manifest if changed
          command: |
            if [ "$CIRCLE_BRANCH" = "$RELEASE_REF" ]; then
              echo "$GITHUB_GPG_SECRET_KEY" | base64 -d > /tmp/private.key
              gpg --import /tmp/private.key
              rm /tmp/private.key
            
              git config credential.helper 'cache --timeout=120'
              git config user.email "automation@filigran.io"
              git config user.name "Filigran Automation"
              git config user.signingkey "$GITHUB_GPG_SIGNING_KEY"
              git config commit.gpgsign true

              manifest_changed=$(git diff manifest.json)
              flag_detected=$(git log -1 --pretty=%B | grep '\[ci build-manifest\]' || echo "")
              if [ -n "$manifest_changed" ] && [ -z "$flag_detected" ] ; then
                echo "Manifest changed. Committing changes..."
                git add .
                # Add custom flag to avoid triggering workflows
                git commit -m "[Automation] Build and update manifest [ci build-manifest]"
                # Push quietly to prevent showing the token in log
                if git push -q https://${GITHUB_TOKEN}@github.com/OpenCTI-Platform/connectors.git ${CIRCLE_BRANCH}; then
                  echo "Manifest changes pushed successfully."
                  exit 0
                else
                  echo "Push rejected, ${CIRCLE_BRANCH} probably moved. Trying rebase..."
                  if ! git pull --rebase origin ${CIRCLE_BRANCH}; then
                    echo "Rebase failed, aborting."
                    git rebase --abort
                    exit 1
                  fi
                  git push -q https://${GITHUB_TOKEN}@github.com/OpenCTI-Platform/connectors.git ${CIRCLE_BRANCH}
                fi
              else
                echo "Manifest not changed. Skipping commit."
                exit 0
              fi
            else
              echo "Skipping, not $RELEASE_REF branch."
            fi
      - run:
          name: Skip steps if flag detected
          command: |
            if git log -1 --pretty=%B | grep -q '\[ci build-manifest\]'; then
              echo "Skipping steps due to [ci build-manifest] flag."
              exit 0
            fi
  test:
    docker:
      - image: cimg/python:3.11
    working_directory: ~/repo
    parallelism: 4
    parameters:
      ci_executor:
        type: executor
        description: Executor to use for this job.
        default: ci_environment
    executor: << parameters.ci_executor >>
    steps:
      - checkout
      - resolve_release_ref
      - run: |
          sudo apt-get update -qq 
          sudo apt install -y \
            curl \
            gettext-base \
            libcairo2-dev libpango1.0-dev  # for internal-export-file/export-report-pdf tests (weasyprint)
      - run:
          name: install dependencies
          command: pip install -r ci-requirements.txt --user
      - run:
          name: Run tests
          command: |
            set -euo pipefail
            circleci tests glob "**/test-requirements.txt" \
              | circleci tests run \
                  --split-by=timings \
                  --command="xargs bash run_test.sh"
      # Save JUnit so CircleCI can show pass/fail per connector and build timings history
      - store_test_results:
          path: test_outputs

      # Save logs/reports as downloadable artifacts
      - store_artifacts:
          path: test_outputs
  build:
    parameters:
      ci_executor:
        type: executor
        description: Executor to use for this job.
        default: ci_environment
    executor: << parameters.ci_executor >>
    steps:
      - checkout
      - resolve_release_ref
      - run:
          name: Install dependencies
          command: pip install -r .circleci/scripts/requirements.txt
      - run:
          name: Execute Python Script
          command: |
            export LATEST_SEMANTIC_VERSION=$(git tag --sort=-v:refname | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)
            python .circleci/scripts/generate_ci.py
      - continuation/continue:
          configuration_path: dynamic.yml
      - slack/notify:
          event: fail
          template: basic_fail_1
  notify:
    parameters:
      notification_executor:
        type: executor
        description: Executor to use for this job.
        default: ci_notifications
    executor: << parameters.notification_executor >>
    steps:
      - run: sudo apt-get update -qq && sudo apt install curl gettext-base
      - slack/notify:
          event: pass
          template: basic_success_1

workflows:
  connectors:
    jobs:
      - ensure_formatting:
          filters:
            tags:
              only: /.*/
      - base_linter:
          filters:
            tags:
              only: /.*/
      - linter:
          filters:
            tags:
              only: /.*/
      - test:
          filters:
            tags:
              only: /.*/
      - build_manifest:
          requires:
            - ensure_formatting
            - base_linter
            - linter
            - test
      - build:
          name: "build_release"
          ci_executor:
            name: ci_environment
            tags: "latest"
          requires:
            - ensure_formatting
            - base_linter
            - linter
            - test
          filters:
            tags:
              only: /[0-9]+(\.[0-9]+)+(\.[0-9]+)*(-lts\.[0-9]*)?/
            branches:
              ignore: /.*/
      - build:
          name: "build_prerelease"
          ci_executor:
            name: ci_environment
            tags: "prerelease"
          requires:
            - ensure_formatting
            - base_linter
            - linter
            - test
          filters:
            branches:
              only:
                - /release\/.*/
      - build:
          name: "build_rolling"
          ci_executor:
            name: ci_environment
            tags: "rolling"
          requires:
            - ensure_formatting
            - base_linter
            - linter
            - test
          filters:
            branches:
              only:
                - master
      - notify:
          name: "send_notifications_release"
          notification_executor:
            name: ci_notifications
          requires:
            - build_release
          filters:
            tags:
              only: /.*/
      - notify:
          name: "send_notifications_rolling"
          notification_executor:
            name: ci_notifications
          requires:
            - build_rolling
          filters:
            tags:
              only: /.*/
      - notify:
          name: "send_notifications_prerelease"
          notification_executor:
            name: ci_notifications
          requires:
            - build_prerelease
          filters:
            tags:
              only: /.*/

name: Build Connector Images

on:
  push:
    branches:
      - master
      - 'release/*'
      - 'lts/*'
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'

concurrency:
  group: build-connectors-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  lint:
    uses: ./.github/workflows/lint.yml
    permissions:
      contents: read

  tests:
    uses: ./.github/workflows/tests-connectors.yml
    permissions:
      contents: read
    secrets: inherit

  build-ubi9:
    needs: [lint, tests]
    uses: ./.github/workflows/build-ubi9.yml
    permissions:
      contents: read
      packages: write
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME_UBI9 }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASS_UBI9 }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

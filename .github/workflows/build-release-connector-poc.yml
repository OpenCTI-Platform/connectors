name: "Release Connector (POC)"

on:
  workflow_dispatch:
    inputs:
      connector_name:
        description: >
          Connector directory name (e.g. "mitre", "misp").
          Must be unique across type directories — workflow errors if ambiguous.
        required: true
        type: string
      version:
        description: >
          Optional CalVer override (e.g. "7.260603.0").
          If omitted, auto-computed as 7.YYMMDD.PATCH from today's date.
        required: false
        type: string
        default: ""
      dry_run:
        description: "Dry run — build images but skip push and release creation"
        required: false
        type: boolean
        default: true

concurrency:
  group: release-connector-${{ inputs.connector_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────
  # 1. Resolve connector directory and build configuration
  # ──────────────────────────────────────────────────────────
  resolve:
    name: Resolve connector ${{ inputs.connector_name }}
    runs-on: ubuntu-latest
    outputs:
      connector_dir: ${{ steps.find.outputs.connector_dir }}
      connector_type: ${{ steps.find.outputs.connector_type }}
      connector_type_env: ${{ steps.find.outputs.connector_type_env }}
      version: ${{ steps.version.outputs.version }}
      python_version: ${{ steps.variants.outputs.python_version }}
      fips: ${{ steps.variants.outputs.fips }}
      image_name: ${{ steps.meta.outputs.image_name }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-tags: true
          sparse-checkout: |
            external-import
            internal-enrichment
            internal-export-file
            internal-import-file
            stream
          sparse-checkout-cone-mode: false

      - name: Find connector directory
        id: find
        run: |
          CONNECTOR_NAME="${{ inputs.connector_name }}"
          TYPE_DIRS="external-import internal-enrichment internal-export-file internal-import-file stream"

          MATCHES=()
          for type_dir in $TYPE_DIRS; do
            if [ -d "${type_dir}/${CONNECTOR_NAME}" ]; then
              MATCHES+=("${type_dir}/${CONNECTOR_NAME}")
            fi
          done

          if [ ${#MATCHES[@]} -eq 0 ]; then
            echo "::error::Connector '${CONNECTOR_NAME}' not found in any type directory."
            echo ""
            echo "Searched in: $TYPE_DIRS"
            exit 1
          fi

          if [ ${#MATCHES[@]} -gt 1 ]; then
            echo "::error::Ambiguous connector name '${CONNECTOR_NAME}' — found in multiple directories:"
            for match in "${MATCHES[@]}"; do
              echo "  - $match"
            done
            echo ""
            echo "This connector name is ambiguous. Please disambiguate by using the full path in a future version of this workflow."
            exit 1
          fi

          CONNECTOR_DIR="${MATCHES[0]}"
          TYPE_DIR=$(echo "$CONNECTOR_DIR" | cut -d/ -f1)
          # e.g. external-import -> EXTERNAL_IMPORT
          CONNECTOR_TYPE_ENV=$(echo "$TYPE_DIR" | tr '[:lower:]-' '[:upper:]_')

          {
            echo "connector_dir=$CONNECTOR_DIR"
            echo "connector_type=$TYPE_DIR"
            echo "connector_type_env=$CONNECTOR_TYPE_ENV"
          } >> "$GITHUB_OUTPUT"

          echo "✅ Resolved: $CONNECTOR_DIR (type: $CONNECTOR_TYPE_ENV)"

      - name: Compute version
        id: version
        run: |
          CONNECTOR_NAME="${{ inputs.connector_name }}"
          INPUT_VERSION="${{ inputs.version }}"
          MAJOR=7

          if [ -n "$INPUT_VERSION" ]; then
            if ! echo "$INPUT_VERSION" | grep -qE '^[0-9]+\.[0-9]{6}\.[0-9]+$'; then
              echo "::error::Invalid CalVer version: '$INPUT_VERSION'. Expected format: MAJOR.YYMMDD.PATCH (e.g. 7.260603.0)"
              exit 1
            fi
            VERSION="$INPUT_VERSION"
          else
            TODAY=$(date -u +"%y%m%d")

            # Find existing tags for this connector with today's date and increment patch
            PATCH=0
            while git tag --list "${CONNECTOR_NAME}/${MAJOR}.${TODAY}.${PATCH}" | grep -q .; do
              PATCH=$((PATCH + 1))
            done

            VERSION="${MAJOR}.${TODAY}.${PATCH}"
            echo "🗓️ Auto-computed version from date: $VERSION"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📌 Version: $VERSION"

      - name: Detect build variants
        id: variants
        run: |
          CONNECTOR_DIR="${{ steps.find.outputs.connector_dir }}"

          # Python version: extract from Dockerfile FROM line (default: 3.12)
          PYTHON_VERSION="3.12"
          if [ -f "${CONNECTOR_DIR}/Dockerfile" ]; then
            FROM_VERSION=$(grep -oE 'python:([0-9]+\.[0-9]+)' "${CONNECTOR_DIR}/Dockerfile" | head -1 | cut -d: -f2)
            if [ -n "$FROM_VERSION" ]; then
              PYTHON_VERSION="$FROM_VERSION"
            fi
          fi

          # FIPS: detected by the presence of Dockerfile_fips
          FIPS="false"
          if [ -f "${CONNECTOR_DIR}/Dockerfile_fips" ]; then
            FIPS="true"
          fi

          echo "python_version=$PYTHON_VERSION" >> "$GITHUB_OUTPUT"
          echo "fips=$FIPS" >> "$GITHUB_OUTPUT"
          echo "📦 Python: $PYTHON_VERSION | FIPS: $FIPS"

      - name: Compute image metadata
        id: meta
        run: |
          CONNECTOR_NAME="${{ inputs.connector_name }}"
          VERSION="${{ steps.version.outputs.version }}"

          IMAGE_NAME="connector-${CONNECTOR_NAME}"
          IMAGE_TAG="${VERSION}"

          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

          echo "🐳 Image: opencti/${IMAGE_NAME}:${IMAGE_TAG}"

  # ──────────────────────────────────────────────────────────
  # 2. Generate release notes from conventional commits
  # ──────────────────────────────────────────────────────────
  release-notes:
    name: Generate release notes
    runs-on: ubuntu-latest
    needs: resolve
    outputs:
      changelog: ${{ steps.cliff.outputs.content || steps.rerelease-final.outputs.changelog || steps.initial.outputs.changelog }}
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Check for previous tag and changes
        id: prev
        run: |
          CONNECTOR_DIR="${{ needs.resolve.outputs.connector_dir }}"
          PREV_TAG=$(git tag --list "${{ inputs.connector_name }}/*" --sort=-version:refname | head -1)

          if [ -z "$PREV_TAG" ]; then
            echo "status=initial" >> "$GITHUB_OUTPUT"
            echo "📌 No previous tag — initial release"
          else
            echo "tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
            COMMIT_COUNT=$(git log "${PREV_TAG}..HEAD" --oneline --no-merges -- "${CONNECTOR_DIR}/" | wc -l | tr -d ' ')
            if [ "$COMMIT_COUNT" -gt 0 ]; then
              echo "status=changed" >> "$GITHUB_OUTPUT"
              echo "📌 Previous tag: $PREV_TAG ($COMMIT_COUNT new commits)"
            else
              echo "status=unchanged" >> "$GITHUB_OUTPUT"
              echo "📌 Previous tag: $PREV_TAG (no new commits — re-release)"
            fi
          fi

      - name: Generate changelog with git-cliff
        id: cliff
        if: steps.prev.outputs.status == 'changed'
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: cliff.toml
          args: >-
            --tag-pattern "${{ inputs.connector_name }}/*"
            --include-path "${{ needs.resolve.outputs.connector_dir }}/**"
            --tag "${{ inputs.connector_name }}/${{ needs.resolve.outputs.version }}"
            --unreleased
            --strip header
        env:
          OUTPUT: /tmp/changelog.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get previous changelog for re-release
        id: rerelease
        if: steps.prev.outputs.status == 'unchanged'
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: cliff.toml
          args: >-
            --tag-pattern "${{ inputs.connector_name }}/*"
            --include-path "${{ needs.resolve.outputs.connector_dir }}/**"
            --latest
            --strip header
        env:
          OUTPUT: /tmp/prev-changelog.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepend re-release notice
        id: rerelease-final
        if: steps.prev.outputs.status == 'unchanged'
        run: |
          PREV_CHANGELOG=$(cat /tmp/prev-changelog.md 2>/dev/null || true)
          {
            echo "changelog<<EOF"
            echo "> ♻️ **Re-release** — no changes since \`${{ steps.prev.outputs.tag }}\`."
            echo ""
            echo "$PREV_CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Initial release notes (no prior tag)
        id: initial
        if: steps.prev.outputs.status == 'initial'
        run: |
          {
            echo "changelog<<EOF"
            echo "This is the first independent release for **${{ inputs.connector_name }}** (\`${{ needs.resolve.outputs.connector_dir }}\`)."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────────────────
  # 3. Build and push Docker image
  # ──────────────────────────────────────────────────────────
  build:
    name: Build ${{ needs.resolve.outputs.image_name }}
    runs-on: ubuntu-latest
    needs: resolve
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to DockerHub
        if: ${{ !inputs.dry_run }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Login to GitHub Container Registry
        if: ${{ !inputs.dry_run }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ needs.resolve.outputs.connector_dir }}
          file: ${{ needs.resolve.outputs.connector_dir }}/Dockerfile
          pull: true
          push: ${{ !inputs.dry_run }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            opencti/${{ needs.resolve.outputs.image_name }}:${{ needs.resolve.outputs.image_tag }}
            ghcr.io/opencti-platform/opencti/${{ needs.resolve.outputs.image_name }}:${{ needs.resolve.outputs.image_tag }}

      - name: Build and push FIPS image
        if: ${{ needs.resolve.outputs.fips == 'true' }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ needs.resolve.outputs.connector_dir }}
          file: ${{ needs.resolve.outputs.connector_dir }}/Dockerfile_fips
          pull: true
          push: ${{ !inputs.dry_run }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            opencti/${{ needs.resolve.outputs.image_name }}:${{ needs.resolve.outputs.image_tag }}-fips
            ghcr.io/opencti-platform/opencti/${{ needs.resolve.outputs.image_name }}:${{ needs.resolve.outputs.image_tag }}-fips

  # ──────────────────────────────────────────────────────────
  # 4. Create GitHub Release
  # ──────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [resolve, release-notes, build]
    if: always()
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGELOG: ${{ needs.release-notes.outputs.changelog }}
        run: |
          CONNECTOR_NAME="${{ inputs.connector_name }}"
          CONNECTOR_DIR="${{ needs.resolve.outputs.connector_dir }}"
          VERSION="${{ needs.resolve.outputs.version }}"
          TAG="${CONNECTOR_NAME}/${VERSION}"
          TITLE="${CONNECTOR_NAME} ${VERSION}"

          echo "🏷️  Creating tag: $TAG"
          echo "📋 Title: $TITLE"

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then echo "::error::Tag '$TAG' already exists."; exit 1; fi
          git tag "$TAG"
          git push origin "$TAG"

          gh release create "$TAG" \
            --title "$TITLE" \
            --notes "$CHANGELOG" \
            --target "${{ github.sha }}"

          # Attach connector manifest as release asset
          MANIFEST="${CONNECTOR_DIR}/__metadata__/connector_manifest.json"
          if [ -f "$MANIFEST" ]; then
            gh release upload "$TAG" "$MANIFEST" --clobber
          fi

          echo "✅ Release created: $TITLE"

  # ──────────────────────────────────────────────────────────
  # 5. Summary
  # ──────────────────────────────────────────────────────────
  summary:
    name: Release summary
    runs-on: ubuntu-latest
    needs: [resolve, release-notes, build, release]
    if: always()
    steps:
      - name: Print summary
        run: |
          DRY_RUN="${{ inputs.dry_run }}"
          CONNECTOR="${{ inputs.connector_name }}"
          VERSION="${{ needs.resolve.outputs.version }}"
          DIR="${{ needs.resolve.outputs.connector_dir }}"
          IMAGE="${{ needs.resolve.outputs.image_name }}:${{ needs.resolve.outputs.image_tag }}"
          FIPS="${{ needs.resolve.outputs.fips }}"

          {
            echo "## 🚀 Release Connector — Summary"
            echo ""
            if [ "$DRY_RUN" = "true" ]; then
              echo "> ⚠️ **DRY RUN** — no images were pushed and no release was created."
              echo ""
            fi
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| Connector | \`${CONNECTOR}\` |"
            echo "| Version | \`${VERSION}\` |"
            echo "| Directory | \`${DIR}\` |"
            echo "| Image | \`opencti/${IMAGE}\` |"
            echo "| FIPS | ${FIPS} |"
            echo "| Dry Run | ${DRY_RUN} |"
            echo ""

            echo "### Job Results"
            echo ""
            echo "| Job | Status |"
            echo "|-----|--------|"
            echo "| Resolve | ${{ needs.resolve.result }} |"
            echo "| Release Notes | ${{ needs.release-notes.result }} |"
            echo "| Build | ${{ needs.build.result }} |"
            echo "| Release | ${{ needs.release.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"

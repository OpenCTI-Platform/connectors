on:
  push:
    branches:
      - master
      - 'release/*'
      - 'lts/*'

concurrency:
  group: build-manifest-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  build_manifest:
    name: Build and Commit Manifest
    # if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    # env:
    #   GITHUB_GPG_SECRET_KEY: ${{ secrets.GITHUB_GPG_SECRET_KEY }}
    #   GITHUB_GPG_SIGNING_KEY: ${{ secrets.GITHUB_GPG_SIGNING_KEY }}
    #   PUSH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"


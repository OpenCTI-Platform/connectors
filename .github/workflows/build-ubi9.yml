name: Build UBI9 Images

on:
  workflow_call:
    inputs:
      build_mode:
        description: >
          Build mode: "rolling" (master), "prerelease" (release/* branches),
          or "release" (version tags like 7.260529.0).
        required: true
        type: string
      platforms:
        description: "Target platforms for docker buildx"
        required: false
        type: string
        default: "linux/amd64,linux/arm64"
      push:
        description: "Whether to push images to registries"
        required: false
        type: boolean
        default: true
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_PASSWORD:
        required: true
      GHCR_USERNAME:
        required: true
      GHCR_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  build-matrix:
    name: Generate build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      image_tags: ${{ steps.meta.outputs.image_tags }}
      is_latest: ${{ steps.meta.outputs.is_latest }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          sparse-checkout: .github/ubi9-connectors.json

      - name: Generate build matrix
        id: set-matrix
        run: |
          python3 -c "
          import json, os
          with open('.github/ubi9-connectors.json') as f:
              connectors = json.load(f)
          matrix = {'include': [{'path': c, 'name': os.path.basename(c)} for c in connectors]}
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write('matrix=' + json.dumps(matrix) + '\n')
          "

      - name: Compute image tags
        id: meta
        run: |
          BUILD_MODE="${{ inputs.build_mode }}"
          IS_LATEST="false"

          case "$BUILD_MODE" in
            rolling)
              IMAGE_TAGS="rolling-ubi9"
              ;;
            prerelease)
              IMAGE_TAGS="prerelease-ubi9"
              ;;
            release)
              TAG_NAME="${{ github.ref_name }}"
              LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -1)

              IMAGE_TAGS="${TAG_NAME}-ubi9"
              if [ "$TAG_NAME" = "$LATEST_TAG" ]; then
                IMAGE_TAGS="${IMAGE_TAGS},latest-ubi9"
                IS_LATEST="true"
              fi
              ;;
            *)
              echo "::error::Unknown build mode: $BUILD_MODE"
              exit 1
              ;;
          esac

          echo "image_tags=${IMAGE_TAGS}" >> "$GITHUB_OUTPUT"
          echo "is_latest=$IS_LATEST" >> "$GITHUB_OUTPUT"
          echo "🏷️ UBI9 image tags: $IMAGE_TAGS (is_latest: $IS_LATEST)"

  build:
    name: Build ${{ matrix.name }}-ubi9
    needs: build-matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.build-matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to DockerHub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Parse build configuration
        id: config
        shell: bash
        run: |
          CONNECTOR_PATH="${{ matrix.path }}"

          # Derive CONNECTOR_TYPE from the top-level directory
          # e.g. external-import -> EXTERNAL_IMPORT
          TOP_DIR=$(echo "$CONNECTOR_PATH" | cut -d/ -f1)
          CONNECTOR_TYPE=$(echo "$TOP_DIR" | tr '[:lower:]-' '[:upper:]_')

          # Start build args with CONNECTOR_TYPE
          BUILD_ARGS="CONNECTOR_TYPE=${CONNECTOR_TYPE}"

          # Append overrides from .build.env if it exists
          ENV_FILE="${CONNECTOR_PATH}/.build.env"
          if [ -f "$ENV_FILE" ]; then
            while IFS='=' read -r key val || [ -n "$key" ]; do
              # Skip empty lines and comments
              [[ -z "$key" || "$key" == \#* ]] && continue
              # Strip surrounding double quotes from values
              val="${val#\"}"
              val="${val%\"}"
              BUILD_ARGS="$(printf '%s\n%s=%s' "$BUILD_ARGS" "$key" "$val")"
            done < "$ENV_FILE"
          fi

          # Output multiline build args
          {
            echo "build_args<<EOF"
            echo "$BUILD_ARGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Compute Docker tags
        id: docker-tags
        shell: bash
        run: |
          IMAGE_TAGS="${{ needs.build-matrix.outputs.image_tags }}"
          CONNECTOR_NAME="${{ matrix.name }}"
          REPO="opencti"

          TAGS=""
          IFS=',' read -ra TAG_ARRAY <<< "$IMAGE_TAGS"
          for tag in "${TAG_ARRAY[@]}"; do
            tag=$(echo "$tag" | xargs)
            if [ -n "$TAGS" ]; then
              TAGS="${TAGS}"$'\n'
            fi
            TAGS="${TAGS}${REPO}/connector-${CONNECTOR_NAME}:${tag}"$'\n'
            TAGS="${TAGS}ghcr.io/opencti-platform/${REPO}/connector-${CONNECTOR_NAME}:${tag}"
          done

          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.path }}
          file: ./Dockerfile_ubi9
          pull: true
          push: ${{ inputs.push }}
          platforms: ${{ inputs.platforms }}
          build-args: ${{ steps.config.outputs.build_args }}
          tags: ${{ steps.docker-tags.outputs.tags }}

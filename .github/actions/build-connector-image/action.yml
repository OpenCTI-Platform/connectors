name: Build Connector Image
description: Build and push a single connector's Docker image (Alpine, UBI9, optional FIPS)

inputs:
  connector_path:
    description: "Path to the connector directory (e.g. external-import/mitre)"
    required: true
  connector_name:
    description: "Connector name (e.g. mitre)"
    required: true
  fips:
    description: "Whether to also build a FIPS image ('true' or 'false')"
    required: false
    default: "false"
  image_tags:
    description: "Comma-separated image tags (e.g. 'rolling' or '7.260529.0,latest')"
    required: true
  build_mode:
    description: "Build mode: rolling, prerelease, or release"
    required: true
  platforms:
    description: "Target platform for docker buildx (single platform per job for native builds)"
    required: false
    default: "linux/amd64"
  tag_suffix:
    description: "Suffix to append to image tags (e.g. '-amd64', '-arm64') for per-platform tagging before manifest merge"
    required: false
    default: ""
  push:
    description: "Whether to push images"
    required: false
    default: "true"
  digests_dir:
    description: "Directory to write image digests for manifest merge (one file per image)"
    required: false
    default: "/tmp/digests"
  dockerfile:
    description: "Override Dockerfile path. Defaults to {connector_path}/Dockerfile when empty."
    required: false
    default: ""
  variant:
    description: "Build variant (e.g. 'ubi9'). Affects cache keys, OCI labels, and auto-generates build-args for shared Dockerfiles."
    required: false
    default: ""
  sdk_ref:
    description: "Git ref to pin connectors-sdk to. When empty, no pinning is performed (only release-connector sets this)."
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Resolve RELEASE_REF
      if: inputs.build_mode != 'release'
      id: release-ref
      shell: bash
      run: |
        PR_BASE_REF="${{ github.base_ref }}"

        # Ensure candidate remote refs/history exist locally (actions/checkout may only fetch the current ref)
        if git rev-parse --is-shallow-repository 2>/dev/null | grep -q true; then
          git fetch --unshallow --quiet origin || true
        fi
        git fetch --prune --no-tags --quiet origin \
          "+refs/heads/master:refs/remotes/origin/master" \
          "+refs/heads/release/6.9.x:refs/remotes/origin/release/6.9.x" \
          "+refs/heads/lts/*:refs/remotes/origin/lts/*" || true

        if [ -n "${PR_BASE_REF:-}" ]; then
          case "${PR_BASE_REF}" in
            master|release/6.9.x|lts/*)
              RESOLVED_RELEASE_REF="${PR_BASE_REF}"
              ;;
            *)
              RESOLVED_RELEASE_REF="$(bash ./shared/tools/ci/detect-base-branch.sh origin)"
              ;;
          esac
        else
          RESOLVED_RELEASE_REF="$(bash ./shared/tools/ci/detect-base-branch.sh origin)"
        fi
        echo "release_ref=$RESOLVED_RELEASE_REF" >> "$GITHUB_OUTPUT"
        echo "📌 RELEASE_REF: $RESOLVED_RELEASE_REF"

    - name: Rewrite pycti and connectors-sdk dependencies
      if: inputs.build_mode != 'release'
      shell: bash
      run: |
        set -euo pipefail
        CONNECTOR_DIR="${{ inputs.connector_path }}"
        BUILD_MODE="${{ inputs.build_mode }}"
        RELEASE_REF="${{ steps.release-ref.outputs.release_ref }}"
        BRANCH="${{ github.ref_name }}"

        cd "$CONNECTOR_DIR"

        if [ "$BUILD_MODE" = "prerelease" ]; then
          GIT_REF="$BRANCH"
        else
          GIT_REF="$RELEASE_REF"
        fi

        PYCTI_GIT="pycti @ git+https://github.com/OpenCTI-Platform/opencti.git@${GIT_REF}#subdirectory=client-python"
        SDK_GIT="connectors-sdk @ git+https://github.com/OpenCTI-Platform/connectors.git@${GIT_REF}#subdirectory=connectors-sdk"

        echo "🔄 Rewriting pycti/connectors-sdk → git refs (${GIT_REF})"

        find . -name requirements.txt -exec sed -i "s|^pycti==.*$|${PYCTI_GIT}|" {} \;
        find . -name pyproject.toml -exec sed -i "s|pycti==.*$|${PYCTI_GIT}\",|" {} \;
        find . -name requirements.txt -exec sed -i "s|^connectors-sdk.*$|${SDK_GIT}|" {} \;
        find . -name pyproject.toml -exec sed -i "s|connectors-sdk.*$|${SDK_GIT}\",|" {} \;

        echo "✅ Dependency rewrite complete"
        if [ -f src/requirements.txt ]; then
          echo "--- src/requirements.txt ---"
          grep -E 'pycti|connectors-sdk' src/requirements.txt || echo "(no matches)"
        fi

    - name: Pin connectors-sdk for release
      # Only pins when a ref is explicitly provided by the caller (release-connector).
      # Other release-mode builds (e.g. build-all-connectors) leave sdk_ref empty
      # and are intentionally not pinned.
      if: inputs.sdk_ref != ''
      shell: bash
      run: |
        set -euo pipefail
        CONNECTOR_DIR="${{ inputs.connector_path }}"
        SDK_REF="${{ inputs.sdk_ref }}"

        SDK_GIT="connectors-sdk @ git+https://github.com/OpenCTI-Platform/connectors.git@${SDK_REF}#subdirectory=connectors-sdk"

        cd "$CONNECTOR_DIR"
        echo "🔒 Pinning connectors-sdk → ${SDK_REF} (release build)"

        find . \( -name requirements.txt -o -name pyproject.toml \) -exec \
          sed -i -E "s|connectors-sdk @ git\+https://github\.com/OpenCTI-Platform/connectors\.git@[^#]+#subdirectory=connectors-sdk|${SDK_GIT}|g" {} +

        echo "✅ connectors-sdk pinned"
        if [ -f src/requirements.txt ]; then
          echo "--- src/requirements.txt ---"
          grep -E 'connectors-sdk' src/requirements.txt || echo "(no connectors-sdk ref)"
        fi

    - name: Resolve Dockerfile and build args
      id: resolve
      shell: bash
      run: |
        CONNECTOR_PATH="${{ inputs.connector_path }}"
        VARIANT="${{ inputs.variant }}"
        DOCKERFILE="${{ inputs.dockerfile }}"

        # Dockerfile: use override or default to connector's own Dockerfile
        if [ -z "$DOCKERFILE" ]; then
          DOCKERFILE="${CONNECTOR_PATH}/Dockerfile"
        fi
        echo "dockerfile=$DOCKERFILE" >> "$GITHUB_OUTPUT"

        # Cache suffix: append variant to avoid key collisions
        CACHE_SUFFIX=""
        if [ -n "$VARIANT" ]; then
          CACHE_SUFFIX="-${VARIANT}"
        fi
        echo "cache_suffix=$CACHE_SUFFIX" >> "$GITHUB_OUTPUT"

        # Build args: auto-generate for shared Dockerfiles (e.g. UBI9)
        BUILD_ARGS=""
        if [ -n "$VARIANT" ]; then
          TOP_DIR=$(echo "$CONNECTOR_PATH" | cut -d/ -f1)
          CONNECTOR_TYPE=$(echo "$TOP_DIR" | tr '[:lower:]-' '[:upper:]_')
          BUILD_ARGS="CONNECTOR_TYPE=${CONNECTOR_TYPE}"

          # Read per-connector .build.env overrides
          ENV_FILE="${CONNECTOR_PATH}/.build.env"
          if [ -f "$ENV_FILE" ]; then
            while IFS='=' read -r key val || [ -n "$key" ]; do
              [[ -z "$key" || "$key" == \#* ]] && continue
              val="${val#\"}"
              val="${val%\"}"
              BUILD_ARGS="$(printf '%s\n%s=%s' "$BUILD_ARGS" "$key" "$val")"
            done < "$ENV_FILE"
          fi
        fi

        {
          echo "build_args<<EOF"
          echo "$BUILD_ARGS"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

        echo "📦 Dockerfile: $DOCKERFILE | variant: ${VARIANT:-alpine} | cache_suffix: ${CACHE_SUFFIX:-(none)}"

    - name: Compute Docker tags
      id: docker-tags
      shell: bash
      run: |
        IMAGE_TAGS="${{ inputs.image_tags }}"
        CONNECTOR_NAME="${{ inputs.connector_name }}"
        TAG_SUFFIX="${{ inputs.tag_suffix }}"
        REPO="opencti"

        TAGS=""
        IFS=',' read -ra TAG_ARRAY <<< "$IMAGE_TAGS"
        for tag in "${TAG_ARRAY[@]}"; do
          tag=$(echo "$tag" | xargs)
          if [ -n "$TAGS" ]; then
            TAGS="${TAGS}"$'\n'
          fi
          TAGS="${TAGS}${REPO}/connector-${CONNECTOR_NAME}:${tag}${TAG_SUFFIX}"$'\n'
          TAGS="${TAGS}ghcr.io/opencti-platform/${REPO}/connector-${CONNECTOR_NAME}:${tag}${TAG_SUFFIX}"
        done

        {
          echo "tags<<EOF"
          echo "$TAGS"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Compute OCI labels
      id: oci-labels
      uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
      with:
        images: |
          opencti/connector-${{ inputs.connector_name }}
          ghcr.io/opencti-platform/opencti/connector-${{ inputs.connector_name }}
        labels: |
          org.opencontainers.image.vendor=Filigran
          io.opencti.connector.path=${{ inputs.connector_path }}
          io.opencti.build.mode=${{ inputs.build_mode }}
          io.opencti.build.variant=${{ inputs.variant || 'default' }}
          io.opencti.build.run_id=${{ github.run_id }}
          io.opencti.build.run_url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    - name: Build and push
      id: build
      continue-on-error: true
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        context: ${{ inputs.connector_path }}
        file: ${{ steps.resolve.outputs.dockerfile }}
        build-args: ${{ steps.resolve.outputs.build_args }}
        pull: true
        push: ${{ inputs.push == 'true' }}
        platforms: ${{ inputs.platforms }}
        tags: ${{ steps.docker-tags.outputs.tags }}
        labels: ${{ steps.oci-labels.outputs.labels }}
        cache-from: type=registry,ref=ghcr.io/opencti-platform/opencti/cache/connector-${{ inputs.connector_name }}:buildcache${{ steps.resolve.outputs.cache_suffix }}
        cache-to: ${{ inputs.push == 'true' && format('type=registry,ref=ghcr.io/opencti-platform/opencti/cache/connector-{0}:buildcache{1},mode=max', inputs.connector_name, steps.resolve.outputs.cache_suffix) || '' }}

    - name: Retry build and push
      id: build-retry
      if: steps.build.outcome == 'failure'
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        context: ${{ inputs.connector_path }}
        file: ${{ steps.resolve.outputs.dockerfile }}
        build-args: ${{ steps.resolve.outputs.build_args }}
        pull: true
        push: ${{ inputs.push == 'true' }}
        platforms: ${{ inputs.platforms }}
        tags: ${{ steps.docker-tags.outputs.tags }}
        labels: ${{ steps.oci-labels.outputs.labels }}
        cache-from: type=registry,ref=ghcr.io/opencti-platform/opencti/cache/connector-${{ inputs.connector_name }}:buildcache${{ steps.resolve.outputs.cache_suffix }}
        cache-to: ${{ inputs.push == 'true' && format('type=registry,ref=ghcr.io/opencti-platform/opencti/cache/connector-{0}:buildcache{1},mode=max', inputs.connector_name, steps.resolve.outputs.cache_suffix) || '' }}

    - name: Export digest
      if: inputs.push == 'true'
      shell: bash
      run: |
        mkdir -p "${{ inputs.digests_dir }}"
        DIGEST="${{ steps.build-retry.outputs.digest || steps.build.outputs.digest }}"
        echo "$DIGEST" > "${{ inputs.digests_dir }}/${{ inputs.connector_name }}"
        echo "📋 Digest: $DIGEST"

    - name: Compute FIPS Docker tags
      if: inputs.fips == 'true' && inputs.platforms == 'linux/amd64'
      id: fips-tags
      shell: bash
      run: |
        IMAGE_TAGS="${{ inputs.image_tags }}"
        CONNECTOR_NAME="${{ inputs.connector_name }}"
        REPO="opencti"

        TAGS=""
        IFS=',' read -ra TAG_ARRAY <<< "$IMAGE_TAGS"
        for tag in "${TAG_ARRAY[@]}"; do
          tag=$(echo "$tag" | xargs)
          if [ -n "$TAGS" ]; then
            TAGS="${TAGS}"$'\n'
          fi
          TAGS="${TAGS}${REPO}/connector-${CONNECTOR_NAME}:${tag}-fips"$'\n'
          TAGS="${TAGS}ghcr.io/opencti-platform/${REPO}/connector-${CONNECTOR_NAME}:${tag}-fips"
        done

        {
          echo "tags<<EOF"
          echo "$TAGS"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Compute FIPS OCI labels
      if: inputs.fips == 'true' && inputs.platforms == 'linux/amd64'
      id: fips-oci-labels
      uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
      with:
        images: |
          opencti/connector-${{ inputs.connector_name }}
          ghcr.io/opencti-platform/opencti/connector-${{ inputs.connector_name }}
        labels: |
          org.opencontainers.image.vendor=Filigran
          io.opencti.connector.path=${{ inputs.connector_path }}
          io.opencti.build.mode=${{ inputs.build_mode }}
          io.opencti.build.variant=fips
          io.opencti.build.run_id=${{ github.run_id }}
          io.opencti.build.run_url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    - name: Build and push FIPS image
      if: inputs.fips == 'true' && inputs.platforms == 'linux/amd64'
      id: build-fips
      continue-on-error: true
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        context: ${{ inputs.connector_path }}
        file: ${{ inputs.connector_path }}/Dockerfile_fips
        pull: true
        push: ${{ inputs.push == 'true' }}
        platforms: linux/amd64
        tags: ${{ steps.fips-tags.outputs.tags }}
        labels: ${{ steps.fips-oci-labels.outputs.labels }}
        cache-from: type=registry,ref=ghcr.io/opencti-platform/opencti/cache/connector-${{ inputs.connector_name }}:buildcache-fips
        cache-to: ${{ inputs.push == 'true' && format('type=registry,ref=ghcr.io/opencti-platform/opencti/cache/connector-{0}:buildcache-fips,mode=max', inputs.connector_name) || '' }}

    - name: Retry FIPS build and push
      if: inputs.fips == 'true' && inputs.platforms == 'linux/amd64' && steps.build-fips.outcome == 'failure'
      id: build-fips-retry
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        context: ${{ inputs.connector_path }}
        file: ${{ inputs.connector_path }}/Dockerfile_fips
        pull: true
        push: ${{ inputs.push == 'true' }}
        platforms: linux/amd64
        tags: ${{ steps.fips-tags.outputs.tags }}
        labels: ${{ steps.fips-oci-labels.outputs.labels }}
        cache-from: type=registry,ref=ghcr.io/opencti-platform/opencti/cache/connector-${{ inputs.connector_name }}:buildcache-fips
        cache-to: ${{ inputs.push == 'true' && format('type=registry,ref=ghcr.io/opencti-platform/opencti/cache/connector-{0}:buildcache-fips,mode=max', inputs.connector_name) || '' }}
